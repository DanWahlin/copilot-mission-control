<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' blob:;">
  <title>Copilot Mission Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0e22;
      overflow: hidden;
      cursor: default;
      color: #e8ecff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
    }
    body.theme-light, body.theme-light html { background: #dfe7f2; color: #172033; }

    /* Top navigation bar — app brand, live metrics, and right-aligned
       controls. Operational detail lives in the dashboard panels so the
       bar stays quiet while users work in Copilot. */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background:
        linear-gradient(180deg, #1d2a55 0%, #131b39 60%, #0d1430 100%);
      border-bottom: 2px solid #ffd54a;
      box-shadow:
        0 1px 0 rgba(255, 213, 74, 0.25) inset,
        0 6px 14px rgba(0, 0, 0, 0.55);
      font-size: 13px;
      letter-spacing: 0.06em;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
    }
    body.theme-light #topbar {
      background: linear-gradient(180deg, #fbfdff 0%, #eef3f9 100%);
      border-bottom: 1px solid #b9c6d8;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 10px 26px rgba(32, 47, 76, 0.13);
    }
    #topbar .brand {
      display: inline-flex;
      align-items: center;
      color: #ffd54a;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      white-space: nowrap;
    }
    body.theme-light #topbar .brand {
      color: #183153;
      text-shadow: none;
    }
    #topbar-controls {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #topbar button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e8ecff;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    #topbar button:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 213, 74, 0.5);
    }
    body.theme-light #topbar button {
      border-color: #cbd5e1;
      color: #334155;
    }
    body.theme-light #topbar button:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    /* Panels-toggle button — collapse/expand side panels for a focused
       mission-only view. Sits left of the theme button. Uses inline SVG
       so the icon stays crisp in both themes and morphs between the
       "hide" (inward arrows) and "show" (outward arrows) states. */
    #panels-btn,
    #settings-btn,
    #theme-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 28px;
      padding: 0;
    }
    #panels-btn svg {
      width: 30px;
      height: 30px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #panels-btn svg .pupil {
      fill: currentColor;
      stroke: none;
    }
    #settings-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      stroke: none;
    }
    #settings-btn:hover {
      border-color: rgba(97, 214, 255, 0.55);
      color: #bdefff;
    }
    body.theme-light #settings-btn:hover {
      border-color: #7ea1d6;
      color: #1d4ed8;
    }
    /* Theme toggle button — the icon shows the *target* theme (moon in
       light mode → click to go dark; sun in dark mode → click to go
       light). The button bg mirrors that target so the button reads as
       a preview of where you'll end up. */
    #theme-btn {
      background: linear-gradient(180deg, #f6f8fd 0%, #e1e7f3 100%);
      border-color: rgba(15, 30, 70, 0.18);
      color: #1a2240;
      font-size: 19px;
    }
    #theme-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eaeff8 100%);
      border-color: rgba(138, 93, 0, 0.6);
    }
    body.theme-light #theme-btn {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border-color: #334155;
      color: #f8fafc;
    }
    body.theme-light #theme-btn:hover {
      background: linear-gradient(180deg, #334155 0%, #111827 100%);
      border-color: #475569;
    }

    /* Active model chip — shows the model id (e.g. "gpt-5.5") for the
       currently-inspected session. Hidden until the scene reports a
       model so we never flash an empty pill on load. */
    #model-chip {
      flex: 0 1 auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255, 213, 74, 0.12);
      color: #ffd54a;
      border: 1px solid rgba(255, 213, 74, 0.4);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #model-chip.empty { display: none; }
    body.theme-light #model-chip {
      background: #ffffff;
      color: #24344f;
      border-color: #b9c6d8;
    }
    #reset-btn {
      height: 24px;
      padding: 0 10px;
      border-color: rgba(96, 255, 154, 0.35);
      color: #b8ffcf;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    body.theme-light #reset-btn {
      border-color: #8fb0d8;
      color: #1e3a5f;
    }
    @media (max-width: 1280px) {
      #topbar {
        gap: 8px;
        padding: 0 10px;
        font-size: 12px;
      }
      #topbar .brand { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
      #model-chip { max-width: 170px; }
    }
    @media (max-width: 1040px) {
      #model-chip { max-width: 120px; }
    }

    /* HTML inspector overlay. Phaser still owns the mission map; this
       dialog uses native DOM controls for the high-density drill-down so
       scrolling, wrapping, selection, and keyboard close behave like a
       normal desktop UI. */
    #inspector-overlay,
    #attention-overlay,
    #settings-overlay {
      position: fixed;
      inset: 40px 0 0 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.58);
      box-sizing: border-box;
    }
    #inspector-overlay.visible { display: flex; }
    #attention-overlay.visible { display: flex; }
    #settings-overlay { z-index: 34; }
    #settings-overlay.visible { display: flex; }
    #schema-drift-overlay {
      position: fixed;
      inset: 40px 0 0 0;
      z-index: 35;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.58);
      box-sizing: border-box;
    }
    #schema-drift-overlay.visible { display: flex; }
    #inspector-dialog {
      width: min(1120px, calc(100vw - 56px));
      height: min(700px, calc(100vh - 96px));
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      background: #0c1430;
      color: #e8ecff;
      border: 2px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
      padding: 20px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body.theme-light #inspector-dialog {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }
    #schema-drift-dialog {
      width: min(760px, calc(100vw - 56px));
      max-height: min(640px, calc(100vh - 96px));
      overflow: auto;
      background: #0c1430;
      color: #e8ecff;
      border: 2px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
      padding: 20px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body.theme-light #schema-drift-dialog {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }
    #attention-dialog {
      width: min(840px, calc(100vw - 56px));
      max-height: min(680px, calc(100vh - 96px));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      overflow: hidden;
      background: #0c1430;
      color: #e8ecff;
      border: 2px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
      padding: 20px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body.theme-light #attention-dialog {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }
    #settings-dialog {
      width: min(520px, calc(100vw - 56px));
      display: grid;
      gap: 18px;
      background: #0c1430;
      color: #e8ecff;
      border: 2px solid #61d6ff;
      border-radius: 16px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
      padding: 20px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body.theme-light #settings-dialog {
      background: #ffffff;
      color: #1f2937;
      border-color: #b9c6d8;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }
    .settings-form {
      display: grid;
      gap: 14px;
    }
    .settings-field {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid rgba(97, 214, 255, 0.24);
      border-radius: 12px;
      background: rgba(97, 214, 255, 0.08);
    }
    body.theme-light .settings-field {
      background: #f8fafc;
      border-color: #d6dee9;
    }
    .settings-label {
      color: #ffd54a;
      font-size: 13px;
      font-weight: 700;
    }
    body.theme-light .settings-label { color: #1e3a5f; }
    .settings-select {
      width: 100%;
      border: 1px solid #4566c7;
      border-radius: 10px;
      background: #121b3b;
      color: #f5f7ff;
      padding: 10px 12px;
      font: inherit;
      font-size: 13px;
    }
    body.theme-light .settings-select {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
    }
    .inspector-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }
    .inspector-title {
      margin: 0 0 6px 0;
      color: #ffd54a;
      font-size: 18px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inspector-title-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--swatch, #ffd54a);
      box-shadow: 0 0 12px color-mix(in srgb, var(--swatch, #ffd54a) 65%, transparent);
      flex: 0 0 auto;
    }
    body.theme-light .inspector-title { color: #1e3a5f; }
    .inspector-subtitle {
      color: #93a4d8;
      font-size: 12px;
      line-height: 1.5;
    }
    body.theme-light .inspector-subtitle { color: #64748b; }
    .inspector-close {
      width: 34px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255, 122, 122, 0.8);
      background: #1a2448;
      color: #ff8a8a;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    body.theme-light .inspector-close {
      background: #fff4f4;
      color: #a01818;
      border-color: rgba(160, 24, 24, 0.55);
    }
    .inspector-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .inspector-toolbar[hidden],
    .inspector-tabs[hidden] {
      display: none;
    }
    .inspector-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: 12px;
    }
    .inspector-pill {
      border: 1px solid #4566c7;
      background: #121b3b;
      color: #cbd6ff;
      border-radius: 10px;
      padding: 8px 14px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .inspector-pill.active {
      border-color: #ffd54a;
      color: #ffd54a;
      background: #25346c;
      box-shadow: inset 0 0 0 1px rgba(255, 213, 74, 0.35);
    }
    body.theme-light .inspector-pill {
      background: #f8fafc;
      color: #334155;
      border-color: #cbd5e1;
    }
    body.theme-light .inspector-pill.active {
      background: #e0ecff;
      color: #1d4ed8;
      border-color: #93c5fd;
    }
    .inspector-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, 0.95fr);
      gap: 18px;
    }
    .inspector-list,
    .inspector-detail {
      min-height: 0;
      overflow: auto;
      scrollbar-gutter: stable;
      scrollbar-width: auto;
      scrollbar-color: #7f97ef #07102b;
      border: 1px solid #31437a;
      border-radius: 12px;
      background: rgba(16, 24, 51, 0.88);
      padding: 12px;
      box-sizing: border-box;
    }
    body.theme-light .inspector-list,
    body.theme-light .inspector-detail {
      background: #f7f9fd;
      border-color: #d6dee9;
      scrollbar-color: #6f83cc #e0e6f3;
    }
    .inspector-row {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      border: 1px solid rgba(127, 151, 239, 0.34);
      border-radius: 10px;
      background: rgba(97, 214, 255, 0.10);
      color: inherit;
      padding: 12px;
      margin: 0 0 10px 0;
      cursor: pointer;
      font: inherit;
    }
    .inspector-row.active {
      border-color: #ffd54a;
      background: rgba(255, 213, 74, 0.16);
    }
    .inspector-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 4px;
      background: #61d6ff;
    }
    .inspector-row.failed .inspector-dot { background: #ff5252; }
    .inspector-row-main {
      min-width: 0;
    }
    .inspector-row-title {
      display: block;
      font-weight: 700;
      color: #f5f7ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.theme-light .inspector-row-title { color: #1f2937; }
    .inspector-row-sub,
    .inspector-row-meta,
    .inspector-empty {
      color: #93a4d8;
      font-size: 12px;
      line-height: 1.5;
    }
    body.theme-light .inspector-row-sub,
    body.theme-light .inspector-row-meta,
    body.theme-light .inspector-empty { color: #64748b; }
    .inspector-row-meta {
      white-space: nowrap;
      text-align: right;
    }
    .inspector-detail h3 {
      margin: 0 0 14px 0;
      color: #ffd54a;
      font-size: 16px;
    }
    body.theme-light .inspector-detail h3 { color: #1e3a5f; }
    .inspector-kv {
      display: grid;
      grid-template-columns: minmax(90px, 130px) 1fr;
      gap: 8px 14px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.55;
    }
    .inspector-kv dt {
      color: #93a4d8;
    }
    .inspector-kv dd {
      margin: 0;
      overflow-wrap: anywhere;
    }
    body.theme-light .inspector-kv dt { color: #64748b; }
    .inspector-reveal {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 213, 74, 0.28);
      border-radius: 10px;
      background: rgba(255, 213, 74, 0.08);
    }
    .inspector-reveal-warning {
      color: #ffd54a;
      font-size: 12px;
      line-height: 1.5;
    }
    body.theme-light .inspector-reveal {
      border-color: rgba(180, 83, 9, 0.22);
      background: #fff7ed;
    }
    body.theme-light .inspector-reveal-warning { color: #92400e; }
    .inspector-related-title {
      color: #ffd54a;
      font-weight: 700;
      margin: 18px 0 10px;
    }
    body.theme-light .inspector-related-title { color: #1e3a5f; }
    .inspector-related {
      display: grid;
      gap: 8px;
    }
    .inspector-related-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(96, 255, 154, 0.12);
      border: 1px solid rgba(96, 255, 154, 0.22);
      font-size: 12px;
    }
    .inspector-related-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    .inspector-related-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }
    .inspector-related-sub {
      color: #93a4d8;
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .inspector-related-meta {
      flex: 0 0 auto;
      color: #93a4d8;
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
      white-space: nowrap;
    }
    body.theme-light .inspector-related-sub,
    body.theme-light .inspector-related-meta { color: #64748b; }
    .inspector-related-item.failed {
      background: rgba(255, 82, 82, 0.12);
      border-color: rgba(255, 82, 82, 0.25);
    }
    @media (max-width: 900px) {
      #inspector-dialog { height: min(760px, calc(100vh - 80px)); }
      .inspector-body { grid-template-columns: 1fr; }
    }

    /* The Phaser canvas mounts inside #game and fills the area below
       the top bar. Tauri's window-state plugin restores window size on
       launch; Phaser scales to whatever the viewport ends up being. */
    #game {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0e22;
    }
    body.theme-light #game { background: #dfe7f2; }
    canvas { display: block; }
    #dashboard-overlay {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      pointer-events: none;
      font-family: '"Press Start 2P"', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .dashboard-loading {
      position: fixed;
      inset: 40px 0 0 0;
      z-index: 9;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, rgba(13, 97, 245, 0.24), transparent 36%),
        #05081a;
      transition: opacity 0.18s ease, visibility 0.18s ease;
    }
    .dashboard-loading-card {
      width: min(980px, 82vw);
      border: 2px solid rgba(255, 213, 74, 0.42);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(5, 8, 26, 0.82);
      box-shadow:
        0 0 0 1px rgba(97, 214, 255, 0.22) inset,
        0 28px 90px rgba(0, 0, 0, 0.56);
    }
    .dashboard-loading-card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .dashboard-loading-caption {
      padding: 14px 18px;
      color: #ffd54a;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(37, 52, 108, 0.88), rgba(16, 24, 51, 0.92));
    }
    body.theme-light .dashboard-loading {
      background:
        radial-gradient(circle at 50% 45%, rgba(13, 97, 245, 0.14), transparent 36%),
        #f4f7fb;
    }
    body.theme-light .dashboard-loading-card {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(13, 97, 245, 0.25);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.18);
    }
    body.theme-light .dashboard-loading-caption {
      color: #1e3a5f;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(238, 242, 247, 0.96));
    }
    body.dashboard-splash-hidden .dashboard-loading {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    body:not(.dashboard-ready) #dashboard-overlay .cmc-panel {
      display: none;
    }
    .cmc-panel {
      position: absolute;
      pointer-events: auto;
      box-sizing: border-box;
      background: linear-gradient(180deg, rgba(16, 26, 58, 0.94), rgba(10, 16, 36, 0.94));
      border: 2px solid rgba(28, 39, 80, 0.9);
      border-radius: 16px;
      box-shadow: 6px 7px 0 rgba(2, 7, 19, 0.52);
      color: #e8ecff;
      padding: 48px 20px 16px;
      overflow: hidden;
    }
    #dom-session {
      padding-bottom: 16px;
    }
    body.theme-light .cmc-panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 253, 0.98));
      border-color: #b8c5d7;
      box-shadow:

      background: linear-gradient(180deg, #ecfdf3 0%, #dffbea 100%);
      border-color: #86efac;
      color: #14532d;
      box-shadow:
        0 8px 22px rgba(15, 23, 42, 0.12),
        0 0 18px rgba(34, 197, 94, 0.18);
    }
    body.theme-light #update-banner .update-link { color: #15803d; }
    body.theme-light #update-banner .update-dismiss { color: rgba(20, 83, 45, 0.55); }
    body.theme-light #update-banner .update-dismiss:hover { color: #14532d; }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="brand">Copilot Mission Control</span>
    <span id="topbar-controls">
      <span id="model-chip" class="empty" title="Active model for the selected session"></span>
      <button id="reset-btn" type="button" title="Reset visible activity counters without deleting Copilot session files" aria-label="Reset visible activity counters">Reset</button>
      <button id="panels-btn" type="button" title="Hide side panels for focus mode" aria-label="Hide side panels for focus mode"></button>
      <button id="settings-btn" type="button" title="Open settings" aria-label="Open settings">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M9.41 1.05c-.41-1.4-2.4-1.4-2.81 0l-.1.34a1.46 1.46 0 0 1-2.11.87l-.31-.17c-1.28-.7-2.69.71-1.99 1.99l.17.31a1.46 1.46 0 0 1-.87 2.11l-.34.1c-1.4.41-1.4 2.4 0 2.81l.34.1a1.46 1.46 0 0 1 .87 2.11l-.17.31c-.7 1.28.71 2.69 1.99 1.99l.31-.17a1.46 1.46 0 0 1 2.11.87l.1.34c.41 1.4 2.4 1.4 2.81 0l.1-.34a1.46 1.46 0 0 1 2.11-.87l.31.17c1.28.7 2.69-.71 1.99-1.99l-.17-.31a1.46 1.46 0 0 1 .87-2.11l.34-.1c1.4-.41 1.4-2.4 0-2.81l-.34-.1a1.46 1.46 0 0 1-.87-2.11l.17-.31c.7-1.28-.71-2.69-1.99-1.99l-.31.17a1.46 1.46 0 0 1-2.11-.87l-.1-.34ZM8 10.93a2.93 2.93 0 1 1 0-5.86 2.93 2.93 0 0 1 0 5.86Z"></path>
        </svg>
      </button>
      <button id="theme-btn" type="button" title="Toggle light/dark theme" aria-label="Switch to light theme">🌙</button>
    </span>
  </div>

  <div id="update-banner" role="status" aria-live="polite">
    <span class="update-icon">🚀</span>
    <span>Version <strong id="update-version"></strong> is available.</span>
    <span class="update-link">View Release</span>
    <span class="update-dismiss" id="update-dismiss" title="Dismiss" aria-label="Dismiss update notification">×</span>
  </div>

  <div id="game"></div>
  <div id="dashboard-loading" class="dashboard-loading" role="status" aria-live="polite">
    <div class="dashboard-loading-card">
      <img src="../docs/img/copilot-mission-control.webp" alt="Copilot Mission Control dashboard preview">
      <div class="dashboard-loading-caption">Initializing mission control…</div>
    </div>
  </div>
  <div id="dashboard-overlay" aria-label="Mission Control dashboard">
    <section id="dom-session" class="cmc-panel"><div class="cmc-panel-title">Selected Session</div><div class="cmc-panel-body"></div></section>
    <section id="dom-feed" class="cmc-panel"><div class="cmc-panel-title">Recent Activity Feed</div><div class="cmc-panel-body"></div></section>
    <section id="dom-quarter" class="cmc-panel" aria-live="polite"><div class="cmc-panel-title">Sector</div><div class="cmc-panel-body"></div></section>
    <section id="dom-replay" class="cmc-panel"></section>
  </div>

  <section id="settings-overlay" aria-hidden="true">
    <div id="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title" tabindex="-1">
      <div class="inspector-header">
        <div>
          <h2 id="settings-title" class="inspector-title">Settings</h2>
        </div>
        <button id="settings-close" class="inspector-close" type="button" aria-label="Close settings">×</button>
      </div>
      <div class="settings-form">
        <label class="settings-field" for="app-theme-select">
          <span class="settings-label">App theme</span>
          <select id="app-theme-select" class="settings-select">
            <option value="space">Space</option>
            <option value="medieval">Medieval Kingdom</option>
          </select>
        </label>
      </div>
      <div class="cmc-actions">
        <button id="settings-done" class="cmc-button accent" type="button">Done</button>
      </div>
    </div>
  </section>

  <section id="attention-overlay" aria-hidden="true">
    <div id="attention-dialog" role="dialog" aria-modal="true" aria-labelledby="attention-title" tabindex="-1">
      <div class="inspector-header">
        <div>
          <h2 id="attention-title" class="inspector-title">Attention Center</h2>
          <div id="attention-subtitle" class="inspector-subtitle"></div>
        </div>
        <button id="attention-close" class="inspector-close" type="button" aria-label="Close Attention Center">×</button>
      </div>
      <div id="attention-body"></div>
    </div>
  </section>

  <section id="inspector-overlay" aria-hidden="true">
    <div id="inspector-dialog" role="dialog" aria-modal="true" aria-labelledby="inspector-title" tabindex="-1">
      <div class="inspector-header">
        <div>
          <h2 id="inspector-title" class="inspector-title">Inspector</h2>
          <div id="inspector-subtitle" class="inspector-subtitle"></div>
        </div>
        <button id="inspector-close" class="inspector-close" type="button" aria-label="Close inspector">×</button>
      </div>
      <div class="inspector-toolbar">
        <button class="inspector-pill active" type="button" data-inspector-mode="tools" aria-pressed="true">Tools</button>
        <button class="inspector-pill" type="button" data-inspector-mode="turns" aria-pressed="false">Turns</button>
        <div id="inspector-tabs" class="inspector-tabs" aria-label="Tool filters"></div>
      </div>
      <div class="inspector-body">
        <div id="inspector-list" class="inspector-list" tabindex="0"></div>
        <div id="inspector-detail" class="inspector-detail"></div>
      </div>
    </div>
  </section>

  <section id="schema-drift-overlay" aria-hidden="true">
    <div id="schema-drift-dialog" role="dialog" aria-modal="true" aria-labelledby="schema-drift-title" tabindex="-1">
      <div class="inspector-header">
        <div>
          <h2 id="schema-drift-title" class="inspector-title">Possible Copilot schema drift</h2>
          <div id="schema-drift-subtitle" class="inspector-subtitle"></div>
        </div>
        <button id="schema-drift-close" class="inspector-close" type="button" aria-label="Close schema drift dialog">×</button>
      </div>
      <div id="schema-drift-body" class="cmc-label" style="margin:14px 0"></div>
      <div class="cmc-actions">
        <button id="schema-drift-report" class="cmc-button warn" type="button">Report schema drift</button>
        <button id="schema-drift-dismiss" class="cmc-button" type="button">Dismiss</button>
      </div>
    </div>
  </section>

  <script src="./hud.js"></script>
  <script src="./phaser.min.js"></script>
  <script type="module" src="./game.js"></script>
</body>
</html>
