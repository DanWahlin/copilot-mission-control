name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: '--target universal-apple-darwin'
          - os: windows-latest
            platform: win
            args: ''
          - os: ubuntu-22.04
            platform: linux
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'mac' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copilot-mission-control-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.msi.sig
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.deb.sig
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.rpm.sig
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz.sig
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate updater manifest (latest.json)
        env:
          MAC_SIG: ''
          WIN_SIG: ''
          LINUX_SIG: ''
          MAC_FILE: ''
          WIN_FILE: ''
          LINUX_FILE: ''
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BASE_URL="https://github.com/DanWahlin/copilot-mission-control/releases/download/${GITHUB_REF_NAME}"

          MAC_SIG=$(find artifacts -name "*.app.tar.gz.sig" -type f -exec cat {} \; -quit 2>/dev/null || echo "")
          WIN_SIG=$(find artifacts -name "*.nsis.zip.sig" -type f -exec cat {} \; -quit 2>/dev/null || echo "")
          LINUX_SIG=$(find artifacts -name "*.AppImage.tar.gz.sig" -type f -exec cat {} \; -quit 2>/dev/null || echo "")

          MAC_FILE=$(find artifacts -name "*.app.tar.gz" ! -name "*.sig" -type f -exec basename {} \; 2>/dev/null | head -1)
          WIN_FILE=$(find artifacts -name "*.nsis.zip" ! -name "*.sig" -type f -exec basename {} \; 2>/dev/null | head -1)
          LINUX_FILE=$(find artifacts -name "*.AppImage.tar.gz" ! -name "*.sig" -type f -exec basename {} \; 2>/dev/null | head -1)

          export VERSION BASE_URL MAC_SIG WIN_SIG LINUX_SIG MAC_FILE WIN_FILE LINUX_FILE
          node -e "
            const { VERSION, BASE_URL, MAC_SIG, WIN_SIG, LINUX_SIG, MAC_FILE, WIN_FILE, LINUX_FILE } = process.env;
            const p = {};
            const enc = f => f ? encodeURI(f) : '';
            if (MAC_SIG && MAC_FILE) {
              const url = BASE_URL + '/' + enc(MAC_FILE);
              p['darwin-aarch64'] = { signature: MAC_SIG, url };
              p['darwin-x86_64'] = { signature: MAC_SIG, url };
            }
            if (LINUX_SIG && LINUX_FILE) {
              p['linux-x86_64'] = { signature: LINUX_SIG, url: BASE_URL + '/' + enc(LINUX_FILE) };
            }
            if (WIN_SIG && WIN_FILE) {
              p['windows-x86_64'] = { signature: WIN_SIG, url: BASE_URL + '/' + enc(WIN_FILE) };
            }
            const manifest = {
              version: VERSION,
              pub_date: new Date().toISOString(),
              platforms: p
            };
            require('fs').writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            latest.json
          draft: false
          prerelease: false
          body: |
            ## 🛰️ Download Copilot Mission Control

            A live, second-monitor dashboard for the GitHub Copilot CLI. Every tool call, sub-agent dispatch, and permission prompt becomes a live signal so you can spot stalls and "needs attention" the moment they happen.

            ### 🤖 Install this using the Copilot CLI

            If you have [GitHub Copilot CLI](https://github.com/features/copilot/cli/) installed, you can install Copilot Mission Control with a single prompt:

            ```
            copilot --allow-all -p "Install the latest version of this app for me https://github.com/DanWahlin/copilot-mission-control/releases"
            ```

            > **Note:** The app is not code-signed, so after installing you'll still need to manually run the commands shown below for your operating system.

            Or download the installer for your OS from the **Assets** list below.

            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `*.dmg` | macOS installer (Universal — Apple Silicon + Intel) |

            > Download the `.dmg` file from the **Assets** list below.
            >
            > **Note:** The app is not code-signed. After installing, open Terminal and run:
            > ```
            > sudo xattr -rd com.apple.quarantine /Applications/Copilot\ Mission\ Control.app
            > ```

            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `*.msi` | Windows installer (x64) |
            | `*.exe` | Windows setup executable (x64) |

            > Download the `.msi` or `.exe` file from the **Assets** list below.
            >
            > **Note:** The app is not code-signed, so Windows may flag it:
            > 1. If your browser warns about the download, select **"Keep"**
            > 2. When you see "Windows protected your PC", click **"More info"**
            > 3. Then click **"Run anyway"**

            ### 🐧 Linux
            | File | Description |
            |------|-------------|
            | `*.AppImage` | Universal Linux (run anywhere) |
            | `*.deb` | Debian/Ubuntu package |
            | `*.rpm` | Fedora/RHEL package |

            > Download the `.AppImage`, `.deb`, or `.rpm` file from the **Assets** list below.
            >
            > **Note:** For the AppImage, make it executable first:
            > ```
            > chmod +x Copilot.Mission.Control_*.AppImage
            > ./Copilot.Mission.Control_*.AppImage
            > ```

            ---
            *A live mission-control dashboard for your GitHub Copilot CLI sessions — built with Tauri + Phaser + TypeScript.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
