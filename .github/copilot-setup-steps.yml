name: Copilot Setup Steps
description: Sets up the environment for GitHub Copilot coding agent

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Install Playwright browsers
      run: npx playwright install chromium
      shell: bash

    - name: Build frontend
      run: npm run build:frontend
      shell: bash
