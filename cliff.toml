# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\nAll notable changes to Kingdom of Agents.\n"
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/DanWahlin/kingdom-of-agents" },
]

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
    # Keep only the first line of multi-line commit messages
    { pattern = '\n.*', replace = "" },
]
protect_breaking_commits = false
commit_parsers = [
    # Skip merge commits and bot commits
    { message = "^Merge", skip = true },

    # Keyword-based grouping for freeform commit messages
    { message = "(?i)add|new|create|implement|enhance|improve|support", group = "<!-- 0 -->🚀 Features & Improvements" },
    { message = "(?i)fix|repair|patch|resolve|correct", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "(?i)refactor|rename|restructure|reorganize|clean|simplify", group = "<!-- 2 -->🔧 Refactoring" },
    { message = "(?i)doc|readme|changelog|comment|website|page", group = "<!-- 3 -->📚 Documentation" },
    { message = "(?i)test|spec|playwright|assert", group = "<!-- 4 -->🧪 Testing" },
    { message = "(?i)ci|workflow|deploy|build|release", group = "<!-- 5 -->⚙️ CI/CD & Build" },
    { message = "(?i)style|css|theme|design|layout", group = "<!-- 6 -->🎨 Styling" },
    { message = "(?i)update|bump|upgrade", group = "<!-- 7 -->📦 Updates" },

    # Catch-all
    { message = ".*", group = "<!-- 8 -->💼 Other" },
]
filter_commits = false
fail_on_unmatched_commit = false
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/DanWahlin/kingdom-of-agents/issues/$1" },
]
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
